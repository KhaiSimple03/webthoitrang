{% extends "app/base2.html" %}
{% load static %}

<!DOCTYPE html>

<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title></title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="">
  </head>
  <body>
{% block form_login %}
<section class="vh-100 " style="background-color: #eee;">
  <div class="container h-50">
    <div class="row d-flex justify-content-center align-items-center h-100 ">
      <div class="col-lg-12 col-xl-11 ">
        <div class=" text-black" style="border-radius: 25px;">
          <div class="card-body p-md-5">
            <div class="row justify-content-center">
              
              <!-- Cột Form -->
              <div class="col-md-10 col-lg-6 col-xl-5 order-2 order-lg-1">
                <p class="text-center h1 fw-bold mb-5 mx-1 mx-md-4 mt-4">LOGIN</p>

                <form class="mx-1 mx-md-4" method="POST" action="">
                  {% csrf_token %}
                  
                  <!-- Username -->
                  <div class="d-flex flex-row align-items-center mb-4">
                    <i class="fas fa-user fa-lg me-3 fa-fw mb-3" style="color: black;"></i>
                    <div class="form-outline flex-fill mb-0">
                      <input type="text" id="form3Example1c" class="form-control" name="username" />
                      <label class="form-label" for="form3Example1c">User Name</label>
                    </div>
                  </div>

                  <!-- Password -->
                  <div class="d-flex flex-row align-items-center mb-4">
                    <i class="fas fa-lock fa-lg me-3 fa-fw mb-3" style="color: black;"></i>
                    <div class="form-outline flex-fill mb-0">
                      <input type="password" id="form3Example4c" class="form-control" name="password" />
                      <label class="form-label" for="form3Example4c">Password</label>
                    </div>
                  </div>

                  <!-- Submit Button -->
                  <div class="d-flex justify-content-center mx-4 mb-3 mb-lg-4">
                    <button type="submit" class="btn btn-primary btn-lg">Đăng nhập</button>
                  </div>

                  <!-- Link & Messages -->
                  <p class="text-center h6 fw-bold mb-3 mx-1 mx-md-4">
                    Bạn đã có tài khoản chưa? <a href="{% url 'register' %}">Đăng ký</a>
                  </p>

                  {% for message in messages %}
                    <p id="message" class="alert alert-danger">{{ message }}</p>
                  {% endfor %}
                </form>
              </div>

              <!-- Cột Hình ảnh -->
              <div class="col-md-10 col-lg-6 col-xl-7 d-flex align-items-center order-1 order-lg-2">
                <img src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-registration/draw1.webp"
                     class="img-fluid" alt="Sample image">
              </div>

            </div> <!-- end .row -->
          </div> <!-- end .card-body -->
        </div> <!-- end .card -->
      </div> <!-- end .col -->
    </div> <!-- end .row -->
  </div> <!-- end .container -->
 
  </section>
   <br><br><br>
  
{% endblock form_login %}

    <script src="" async defer></script>
  </body>
</html>
